name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [android, ios, windows, macos, linux]
        include:
          - target: android
            os: ubuntu-latest
            build_cmd: flutter build apk --release
          - target: ios
            os: macos-latest
            build_cmd: flutter build ios --release --no-codesign
          - target: windows
            os: windows-latest
            build_cmd: flutter build windows --release
          - target: macos
            os: macos-latest
            build_cmd: flutter build macos --release
          - target: linux
            os: ubuntu-latest
            build_cmd: flutter build linux --release

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Prepare Android artifact
        if: matrix.target == 'android'
        run: cp build/app/outputs/flutter-apk/app-release.apk catpin-android-unsigned.apk

      - name: Prepare Windows artifact
        if: matrix.target == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath catpin-windows-x64.zip

      - name: Prepare Linux artifact
        if: matrix.target == 'linux'
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../catpin-linux-x64.zip .

      - name: Prepare macOS artifact
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../catpin-macos-x64.app.zip catpin.app

      - name: Prepare iOS artifact (Unsigned IPA)
        if: matrix.target == 'ios'
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          rm -rf Payload/Runner.app/_CodeSignature
          rm -f Payload/Runner.app/embedded.mobileprovision
          zip -r catpin-ios-unsigned.ipa Payload/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catpin-android-unsigned.apk
            catpin-windows-x64.zip
            catpin-linux-x64.zip
            catpin-macos-x64.app.zip
            catpin-ios-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
